<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Dashboard - ReadyNow</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">

        <div class="sidebar-header">
            <span class="sidebar-logo">ReadyNow</span>
            <button class="close-sidebar" onclick="toggleSidebar()">✕</button>
        </div>

        <ul class="sidebar-menu">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="selection.html">Select Location</a></li>
            <li><a href="map.html">Evacuation Information</a></li>
            <li><a href="about.html">About ReadyNow</a></li>
        </ul>

    </div>


    <!-- HEADER -->
    <header class="main-header">

        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>

        <div class="logo">ReadyNow</div>

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
        </nav>

    </header>


    <!-- MAIN CONTENT -->
    <main class="page-container">

        <section class="hero">
            <h1>Dashboard</h1>
            <p>Latest disaster-related news and updates</p>
        </section>


        <!-- NEWS SECTION -->
        <div class="card">

            <h3>Latest Disaster News</h3>

            <ul id="newsList">
                <li>Loading latest disaster news...</li>
            </ul>

        </div>

    </main>


    <footer>
        <p>ReadyNow © 2026</p>
    </footer>


    <script>

        /* Sidebar toggle */

        function toggleSidebar() {
            document.getElementById("sidebar").classList.toggle("open");
        }


        /* Close sidebar when clicking outside */

        document.addEventListener("click", function (e) {

            const sidebar = document.getElementById("sidebar");
            const menuBtn = document.querySelector(".menu-toggle");

            if (
                sidebar.classList.contains("open") &&
                !sidebar.contains(e.target) &&
                !menuBtn.contains(e.target)
            ) {
                sidebar.classList.remove("open");
            }

        });


        /* Load disaster news */

        fetch("https://api.rss2json.com/v1/api.json?rss_url=https://news.google.com/rss/search?q=philippines+disaster&hl=en-PH&gl=PH&ceid=PH:en")

            .then(response => response.json())

            .then(data => {

                const newsList = document.getElementById("newsList");

                newsList.innerHTML = "";

                data.items.slice(0, 5).forEach(article => {

                    const li = document.createElement("li");

                    li.innerHTML = `
                        <a href="${article.link}" target="_blank">
                            ${article.title}
                        </a>
                    `;

                    newsList.appendChild(li);

                });

            })

            .catch(() => {

                document.getElementById("newsList").innerHTML =
                    "<li>Unable to load disaster news.</li>";

            });

    </script>

</body>

</html>
