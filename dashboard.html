<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Dashboard - ReadyNow</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>


<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<div class="sidebar-header">
<span class="sidebar-logo">ReadyNow</span>
<button class="close-sidebar" onclick="toggleSidebar()">✕</button>
</div>

<ul class="sidebar-menu">

<li><a href="dashboard.html">Dashboard</a></li>

<li><a href="selection.html">Select Location</a></li>

<li><a href="map.html">Evacuation Information</a></li>

<li><a href="about.html">About ReadyNow</a></li>

</ul>

</div>


<!-- HEADER -->

<header class="main-header">

<button class="menu-toggle" onclick="toggleSidebar()">☰</button>

<div class="logo">ReadyNow</div>

<nav>

<a href="index.html">Home</a>

<a href="about.html">About</a>

</nav>

</header>


<!-- MAIN CONTENT -->

<main class="page-container">


<section class="hero">

<h1>Dashboard</h1>

<p>Latest disaster-related news and updates</p>

</section>


<!-- NEWS SECTION -->

<div class="card">

<h3>Latest Disaster News</h3>

<div id="newsList" class="news-grid">

Loading latest disaster news...

</div>

</div>


</main>


<footer>

<p>ReadyNow © 2026</p>

</footer>



<script>


/* SIDEBAR TOGGLE */

function toggleSidebar(){

document.getElementById("sidebar").classList.toggle("open");

}



/* CLOSE SIDEBAR WHEN CLICKING OUTSIDE */

document.addEventListener("click", function(e){

const sidebar = document.getElementById("sidebar");

const menuBtn = document.querySelector(".menu-toggle");

if(

sidebar.classList.contains("open") &&

!sidebar.contains(e.target) &&

!menuBtn.contains(e.target)

){

sidebar.classList.remove("open");

}

});



/* LOAD DISASTER NEWS */

fetch("https://api.allorigins.win/get?url=" + encodeURIComponent("https://news.google.com/rss/search?q=philippines+disaster&hl=en-PH&gl=PH&ceid=PH:en"))

.then(response => response.json())

.then(data => {

const parser = new DOMParser();

const xml = parser.parseFromString(data.contents, "text/xml");

const items = xml.querySelectorAll("item");

const newsList = document.getElementById("newsList");

newsList.innerHTML = "";


items.forEach((item, index) => {

if(index >= 6) return;


const title = item.querySelector("title").textContent;

const link = item.querySelector("link").textContent;

const description = item.querySelector("description").textContent;


/* Extract image */

let image = "";

const imgMatch = description.match(/<img.*?src="(.*?)"/);

if(imgMatch){

image = imgMatch[1];

}


/* Create card */

const card = document.createElement("div");

card.className = "news-card";

card.innerHTML = `

<a href="${link}" target="_blank">

<img src="${image}" alt="news image">

<div class="news-content">

<h4>${title}</h4>

<p>Click to read full article</p>

</div>

</a>

`;


newsList.appendChild(card);

});

})

.catch(()=>{

document.getElementById("newsList").innerHTML =
"Unable to load disaster news.";

});


</script>


</body>
</html>
